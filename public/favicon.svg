<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cup body - cream/white tapered shape -->
  <path d="M14 28 L12 56 Q12 60 16 60 L48 60 Q52 60 52 56 L50 28 Z" fill="#fcf1d4" stroke="#e8d9b8" stroke-width="1"/>
  <!-- Blue label band -->
  <rect x="13" y="32" width="38" height="18" rx="1" fill="#0066cc"/>
  <!-- Gold accent stripe at bottom of label -->
  <rect x="13" y="47" width="38" height="3" fill="#ffd600"/>
  <!-- "M" letter on label -->
  <text x="32" y="44" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="14" fill="#fcf1d4">M</text>
  <!-- Topping area - strawberry red -->
  <ellipse cx="32" cy="28" rx="19" ry="5" fill="#cc2233"/>
  <!-- Small fruit bumps -->
  <circle cx="26" cy="27" r="3" fill="#dd3344"/>
  <circle cx="34" cy="26" r="3.5" fill="#dd3344"/>
  <circle cx="38" cy="28" r="2.5" fill="#cc2233"/>
  <!-- Dome lid - transparent look -->
  <path d="M13 28 Q13 12 32 10 Q51 12 51 28" fill="none" stroke="#d0d0d0" stroke-width="1.5" opacity="0.6"/>
  <path d="M13 28 Q13 12 32 10 Q51 12 51 28 Z" fill="white" opacity="0.15"/>
  <!-- Lid rim -->
  <ellipse cx="32" cy="28" rx="20" ry="5.5" fill="none" stroke="#d0d0d0" stroke-width="1.2" opacity="0.5"/>
  <!-- Lid top knob -->
  <ellipse cx="32" cy="10" rx="4" ry="2" fill="#e0e0e0" opacity="0.5"/>
</svg>
